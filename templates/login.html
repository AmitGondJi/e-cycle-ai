<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-Cycle | Smart Eco Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    /* Eco-friendly Green Gradient */
    background: linear-gradient(-45deg, #1b5e20, #2e7d32, #1b5e20, #43a047);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Eco Shapes */
.shape{
    position:absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    color: rgba(255, 255, 255, 0.1);
    font-size: 100px;
    animation:float 8s infinite ease-in-out;
}

.shape1{ top:10%; left:10%; }
.shape2{ bottom:10%; right:15%; animation-delay:2s; }
.shape3{ top:20%; right:20%; font-size: 50px; animation-delay:4s; }

@keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-30px) rotate(20deg);}
}

/* Login Card Upgrade */
.login-card{
    width:420px;
    padding:30px 40px;
    border-radius:30px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 25px 50px rgba(0,0,0,0.3);
    color:white;
    animation:fadeIn 1.2s ease;
    text-align: center;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

/* Project Branding Image */
.project-img {
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 50%;
    margin: 0 auto 15px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
.project-img img {
    width: 70%;
    /* Yahan aap e-waste icon ka use kar sakte hain */
}

.login-card h2{
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 5px;
}
.login-card p {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 25px;
}

.input-group{
    margin-bottom:18px;
    text-align: left;
}

.input-group label{
    font-size:12px;
    margin-left: 5px;
}

.input-group input, select{
    width:100%;
    padding:12px 15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.2);
    margin-top:5px;
    background:rgba(255,255,255,0.05);
    color:white;
    outline:none;
    transition: 0.3s;
}

/* Fix for Select dropdown text color */
select option { color: #333; }

.input-group input:focus, select:focus{
    background:rgba(255,255,255,0.15);
    border-color: #a5d6a7;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#4caf50,#2e7d32);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top: 10px;
    font-size: 16px;
}

.login-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(46,125,50,0.4);
}

.extra-text{
    margin-top:20px;
    font-size:13px;
}

.extra-text a{
    color:#a5d6a7;
    text-decoration:none;
    font-weight: 600;
}

@media(max-width:500px){ .login-card{ width:90%; } }
</style>
</head>

<body>

<div class="shape shape1"><i class="fas fa-recycle"></i></div>
<div class="shape shape2"><i class="fas fa-leaf"></i></div>
<div class="shape shape3"><i class="fas fa-plug"></i></div>

<div class="login-card">
    <div class="project-img">
        <i class="fas fa-mobile-alt" style="color: #2e7d32; font-size: 40px;"></i>
    </div>

    <h2>e-Cycle AI Login</h2>
    <p>Turning E-Waste into Eco-Rewards</p>

    <form method="POST">
        <div class="input-group">
            <label><i class="fas fa-user-shield"></i> Select Role</label>
            <select name="role" required>
                <option value="">-- Choose Role --</option>
                <option value="student">Student / User</option>
                <option value="admin">System Admin</option>
            </select>
        </div>

        <div class="input-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button class="login-btn">Secure Login <i class="fas fa-arrow-right"></i></button>
    </form>

    <div class="extra-text">
        Don't have an account? <a href="/register">Join Eco-Drive</a>
    </div>
</div>

<script>
const canvas = document.createElement("canvas");
document.body.appendChild(canvas);
canvas.style.position="fixed";
canvas.style.top="0";
canvas.style.left="0";
canvas.style.zIndex="-1";

const ctx = canvas.getContext("2d");
let width, height;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let particles = [];
for(let i=0;i<40;i++){
    particles.push({
        x:Math.random()*width,
        y:Math.random()*height,
        r:Math.random()*3 + 1,
        d:Math.random()*0.5 + 0.2
    });
}

function draw(){
    ctx.clearRect(0,0,width,height);
    ctx.fillStyle="rgba(165, 214, 167, 0.2)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        p.y -= p.d;
        if(p.y < 0) p.y = height;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
