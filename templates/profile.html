<!DOCTYPE html>
<html>
<head>
    <title>My Profile | e-Cycle AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f9f4; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .profile-card {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 400px; text-align: center;
        }
        .avatar { width: 100px; height: 100px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; margin: 0 auto 20px auto; color: #2e7d32; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-update { background: #2e7d32; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar"><i class="fas fa-user-circle"></i></div>
        <h2>User Profile</h2>
        <p style="color: #666;">Manage your account details</p>
        <hr style="opacity: 0.2; margin: 20px 0;">
        <form method="POST">
            <label style="float: left; font-size: 13px;">Username</label>
            <input type="text" value="{{ user['username'] }}" disabled style="background: #f9f9f9;">
            
            <label style="float: left; font-size: 13px;">Update Password</label>
            <input type="password" name="password" placeholder="Enter new password" required>
            
            <button type="submit" class="btn-update">Save Changes</button>
        </form>
        <br>
        <a href="/dashboard" style="color: #888; text-decoration: none;">Back to Dashboard</a>
    </div>
</body>
</html>
