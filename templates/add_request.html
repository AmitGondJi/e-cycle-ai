<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Scan | e-Cycle</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f4f9f4 0%, #e8f5e9 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* --- SCANNER OVERLAY (HIGH TECH) --- */
        #scan-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 0, 0.95);
            z-index: 2000;
            color: #00ff00;
            text-align: center;
            padding-top: 10%;
        }

        .scanner-container {
            width: 320px;
            height: 320px;
            margin: 0 auto;
            position: relative;
            border: 4px solid #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            border-radius: 20px;
            background-color: #111;
            overflow: hidden;
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .scan-line {
            width: 100%;
            height: 4px;
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            position: absolute;
            top: 0;
            animation: scanMove 2s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes scanMove {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* --- MODERN FORM CARD --- */
        .upload-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
            border: 1px solid white;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-submit {
            background: #000;
            color: #0f0;
            padding: 15px;
            width: 100%;
            border: 2px solid #0f0;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }

        .custom-file-upload {
            border: 2px dashed #4caf50;
            display: inline-block;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 10px;
            color: #2e7d32;
            transition: 0.3s;
        }
        .custom-file-upload:hover { background: #e8f5e9; }
    </style>
</head>
<body>

    <div id="scan-overlay">
        <div class="scanner-container">
            <div class="scan-line"></div>
            <img id="preview-img" src="#" alt="Scanning...">
        </div>
        <h2 style="letter-spacing: 3px; margin-top: 30px;">
            <i class="fas fa-microchip"></i> AI SYSTEM ANALYZING...
        </h2>
        <p style="color: #888;">Detecting materials and calculating Eco-Points</p>
        <div id="data-stream" style="font-size: 12px; color: #0a0; margin-top: 10px;"></div>
    </div>

    <div class="upload-card">
        <h2 style="color: #2e7d32; margin-top: 0;"><i class="fas fa-camera"></i> AI Smart Scan</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Upload a clear photo of your e-waste for AI detection.</p>
        
        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <label class="custom-file-upload">
                <input type="file" name="file" id="file-input" accept="image/*" required style="display:none;">
                <i class="fas fa-cloud-upload-alt"></i> <span id="file-name">Choose Gadget Photo</span>
            </label>

            <input type="number" name="quantity" placeholder="Quantity (e.g. 1)" required min="1">
            <textarea name="address" placeholder="Pickup Address" rows="3" required></textarea>
            
            <button type="submit" class="btn-submit">🚀 Start AI Recognition</button>
        </form>
        <br>
        <a href="/dashboard" style="color: #888; text-decoration: none; font-size: 14px;">Back to Dashboard</a>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const overlay = document.getElementById('scan-overlay');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const fileNameDisp = document.getElementById('file-name');

        // Photo Preview Logic
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                fileNameDisp.innerText = this.files[0].name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        // Submit Logic with Animation
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            overlay.style.display = 'block';

            // Random Tech Text Effect
            const stream = document.getElementById('data-stream');
            const logs = ["Initializing Neural Engine...", "Running Object Detection...", "Matching Hardware Patterns...", "Calculating Carbon Offset...", "Verification Successful!"];
            let i = 0;
            const interval = setInterval(() => {
                if(i < logs.length) {
                    stream.innerHTML += `> ${logs[i]}<br>`;
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 600);

            setTimeout(function() {
                form.submit();
            }, 3500); 
        });
    </script>
</body>
</html>
