<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | e-Cycle Analytics</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; }

        nav {
            background: linear-gradient(to right, #1a237e, #283593);
            padding: 15px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* STATS */
        .stats-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            width: 90%;
            margin: 30px auto;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 32%;
            display: flex;
            justify-content: space-between;
        }

        .stat-info h3 {
            margin: 0;
            font-size: 30px;
        }

        .card-total { border-left: 6px solid #1a237e; }
        .card-pending { border-left: 6px solid #ff9800; }
        .card-recycled { border-left: 6px solid #4caf50; }

        /* CHART FIXED SIZE */
        .analytics-grid {
            width: 90%;
            margin: auto;
            display: flex;
            justify-content: center;
        }

        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 50%;
            max-width: 500px;
            text-align: center;
        }

        canvas {
            max-height: 250px !important;
        }

        /* TABLE */
        .table-section {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
        }

        .bg-pending { background: orange; }
        .bg-recycled { background: green; }
        .bg-scheduled { background: blue; }
    </style>
</head>

<body>

<nav>
    <h2>e-Cycle ADMIN</h2>
    <a href="/logout" style="color:white;">Logout</a>
</nav>

<!-- STATS -->
<div class="stats-container">
    <div class="stat-card card-total">
        <div class="stat-info">
            <h3 id="top-total">0</h3>
            <p>Total</p>
        </div>
    </div>

    <div class="stat-card card-pending">
        <div class="stat-info">
            <h3 id="top-pending">0</h3>
            <p>Pending</p>
        </div>
    </div>

    <div class="stat-card card-recycled">
        <div class="stat-info">
            <h3 id="top-recycled">0</h3>
            <p>Recycled</p>
        </div>
    </div>
</div>

<!-- ONLY PIE CHART -->
<div class="analytics-grid">
    <div class="chart-box">
        <h4>Waste Distribution</h4>
        <canvas id="wastePieChart"></canvas>
    </div>
</div>

<!-- TABLE -->
<div class="table-section">
<table>
<tr>
<th>ID</th>
<th>User</th>
<th>Item</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for req in requests %}
<tr class="row">
<td>{{ req['id'] }}</td>
<td>{{ req['username'] }}</td>
<td>{{ req['item_name'] }}</td>
<td><span class="badge bg-{{ req['status'].lower() }}">{{ req['status'] }}</span></td>
<td>
<a href="/update_status/{{ req['id'] }}/Recycled">Complete</a>
</td>
</tr>
{% endfor %}

</table>
</div>

<script>

// DATA
const pieLabels = {{ pie_labels | safe }};
const pieValues = {{ pie_values | safe }};

// STATS COUNT
let rows = document.querySelectorAll(".row");
let recycled = 0;

rows.forEach(r => {
    if(r.innerText.includes("Recycled")) recycled++;
});

document.getElementById("top-total").innerText = rows.length;
document.getElementById("top-recycled").innerText = recycled;
document.getElementById("top-pending").innerText = rows.length - recycled;

// PIE CHART
new Chart(document.getElementById("wastePieChart"), {
    type: 'pie',
    data: {
        labels: pieLabels,
        datasets: [{
            data: pieValues,
            backgroundColor: ['#1a237e','#4caf50','#ff9800','#9c27b0']
        }]
    }
});

</script>

</body>
</html>
